<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #fff;
            border-bottom: 1px solid #ddd;
        }

        .profile {
            display: flex;
            flex-direction: column;
            font-size: 0.8rem;
            color: #555;
        }

        .profile span:first-child {
            font-weight: bold;
            color: #222;
        }

        .btn-logout {
            font-size: 0.85rem;
            padding: 6px 14px;
            background: #fff;
            border: 1px solid #f44;
            color: #f44;
            border-radius: 6px;
            text-decoration: none;
        }
        .btn-logout:hover { background: #f44; color: #fff; }

        .chat-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            display: flex;
            width: 100%;
        }

        .msg.sent {
            justify-content: flex-end;
        }

        .msg.recv {
            justify-content: flex-start;
        }

        .msg-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 70%;
            padding: 10px 12px;
            border-radius: 12px;
            word-wrap: break-word;
        }

        .msg.sent .msg-body {
            background: #3498db;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg.recv .msg-body {
            background: #ffffff;
            color: #333;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }

        .msg-meta {
            display: flex;
            gap: 8px;
            align-items: baseline;
            margin-bottom: 2px;
        }

        .msg-name {
            font-weight: bold;
            font-size: 0.8rem;
        }

        .msg-time {
            font-size: 0.72rem;
            color: #aaa;
        }

        .msg.sent .msg-time {
            color: rgba(255, 255, 255, 0.8);
        }

        .msg-text {
            line-height: 1.5;
        }

        .dot {
            display: none;
        }

        .input-bar {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        .input-bar input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.88rem;
            outline: none;
        }
        .input-bar input:focus { border-color: #3498db; }

        .btn-send {
            padding: 8px 18px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.88rem;
            cursor: pointer;
        }
        .btn-send:hover { background: #2980b9; }
    </style>
</head>
<body>

<nav>
    <div class="profile">
        <span>{{ session.get('username', 'User') }}</span>
        <span>{{ session.get('user', '') }}</span>
    </div>
    <a href="{{ url_for('logout') }}" class="btn-logout">Logout</a>
</nav>

<div class="chat-wrap" id="chatWrap">
    {% for msg in messages %}
    <div class="msg {{ 'sent' if msg.sender == session.get('user') else 'recv' }}">
        <div class="msg-body">
            <div class="msg-meta">
                {% if msg.sender != session.get('user') %}
                    <span class="msg-name">{{ msg.sender_name }}</span>
                {% endif %}
                <span class="msg-time" data-time="{{ msg.created_at }}"></span>
            </div>
            <div class="msg-text">{{ msg.content }}</div>
        </div>
    </div>
    {% endfor %}
</div>

<div id="imagePreview" style="display:none; padding: 8px 20px; background:#fff; border-top: 1px solid #ddd;">
    <div style="display:flex; align-items:center; gap:10px; padding:8px; background:#f5f5f5; border-radius:8px; border:1px solid #ddd;">
        <img id="previewThumb" style="width:56px; height:56px; object-fit:cover; border-radius:6px;" />
        <div style="flex:1; min-width:0;">
            <div id="previewName" style="font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
            <div id="previewSize" style="font-size:12px; color:#888;"></div>
        </div>
        <button id="cancelImage" type="button" style="width:22px; height:22px; border-radius:50%; border:none; background:#fde8e8; color:#c0392b; font-size:12px; cursor:pointer; flex-shrink:0;">✕</button>
    </div>
</div>

<div class="input-bar">
  <form id="chatForm" style="display:flex; gap:8px; flex:1;">
    <label for="imageInput" style="cursor:pointer; display:flex; align-items:center; padding: 0 8px; border:1px solid #ddd; border-radius:6px; font-size:1.2rem;">🖼️</label>
    <input id="imageInput" type="file" accept="image/*" style="display:none;" />
    <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off" maxlength="500" />
    <button type="submit" class="btn-send">Send</button>
  </form>
</div>

<!--loads supabase-js from CDN by creating browser client with project url and anon key-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const currentUser = {{ session.get('user', '') | tojson }};
    const supabaseUrl = {{ supabase_url | tojson }};
    const supabaseAnonKey = {{ supabase_anon_key | tojson }};

    const client = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
    const chatWrap = document.getElementById("chatWrap");

    function isNearBottom() {
        const threshold = 100;
        return chatWrap.scrollHeight - chatWrap.scrollTop - chatWrap.clientHeight < threshold;
    }

    function scrollToBottom(force = false) {
        if (force || isNearBottom()) {
            chatWrap.scrollTo({ top: chatWrap.scrollHeight, behavior: "smooth" });
        }
    }

    function formatTime(timestamp) {
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function appendMessage(msg) {
        const isSent = msg.sender === currentUser;

        const wrapper = document.createElement("div");
        wrapper.className = `msg ${isSent ? "sent" : "recv"}`;

        wrapper.innerHTML = `
            <div class="msg-body">
                <div class="msg-meta">
                    ${!isSent ? `<span class="msg-name"></span>` : ``}
                    <span class="msg-time"></span>
                </div>
                <div class="msg-text"></div>
            </div>
        `;

        if (!isSent) {
            wrapper.querySelector(".msg-name").textContent = msg.sender_name;
        }

        wrapper.querySelector(".msg-time").textContent = formatTime(msg.created_at);
        wrapper.querySelector(".msg-text").textContent = msg.content;

        if (msg.image_url) {
            const img = document.createElement("img");
            img.src = msg.image_url;
            img.style.cssText = "max-width:100%; max-height:280px; border-radius:8px; margin-top:6px; display:block; cursor:pointer;";
            img.onclick = () => window.open(msg.image_url, "_blank");
            wrapper.querySelector(".msg-body").appendChild(img);
        }

        chatWrap.appendChild(wrapper);
        scrollToBottom(); //scrolls when already bottom
    }

    async function loadMessages(forceScroll = false) {
        try {
            const response = await fetch("/get-messages");
            if (!response.ok) return;

            const messages = await response.json();
            chatWrap.innerHTML = "";

            messages.forEach(msg => {
                const isSent = msg.sender === currentUser;

                const wrapper = document.createElement("div");
                wrapper.className = `msg ${isSent ? "sent" : "recv"}`;

                wrapper.innerHTML = `
                    <div class="msg-body">
                        <div class="msg-meta">
                            ${!isSent ? `<span class="msg-name">${msg.sender_name}</span>` : ``}
                            <span class="msg-time">${formatTime(msg.created_at)}</span>
                        </div>
                        <div class="msg-text"></div>
                    </div>
                `;

                wrapper.querySelector(".msg-text").textContent = msg.content;
                if (msg.image_url) {
                    const img = document.createElement("img");
                    img.src = msg.image_url;
                    img.style.cssText = "max-width:100%; max-height:280px; border-radius:8px; margin-top:6px; display:block; cursor:pointer;";
                    img.onclick = () => window.open(msg.image_url, "_blank");
                    wrapper.querySelector(".msg-body").appendChild(img);
                }
                chatWrap.appendChild(wrapper);
            });

            scrollToBottom(forceScroll);
        } catch (error) {
            console.error("Failed to load messages:", error);
        }
    }

    client
        .channel("messages-live")
        .on(
            "postgres_changes",
            {
                event: "INSERT",
                schema: "public",
                table: "messages"
            },
            (payload) => {
                appendMessage(payload.new);
            }
        )
    //re-sync on reconnect
    .subscribe((status) => {
        if (status === "SUBSCRIBED") {
            loadMessages(false); //doesn't force scroll
        }
    });

    document.addEventListener("DOMContentLoaded", () => {
        //format initial messages
        document.querySelectorAll(".msg-time").forEach(el => {
            const raw = el.getAttribute("data-time");
            el.textContent = formatTime(raw);
        });

        scrollToBottom(true);
    });
</script>
<script>
    const form = document.getElementById("chatForm");
    const input = document.getElementById("messageInput");
    const imageInput = document.getElementById("imageInput");
    const imagePreview = document.getElementById("imagePreview");
    const previewThumb = document.getElementById("previewThumb");
    const previewName = document.getElementById("previewName");
    const previewSize = document.getElementById("previewSize");
    const cancelImage = document.getElementById("cancelImage");

    function clearImagePreview() {
        imageInput.value = "";
        previewThumb.src = "";
        imagePreview.style.display = "none";
    }

    imageInput.addEventListener("change", () => {
        const file = imageInput.files[0];
        if (!file) return;
        previewThumb.src = URL.createObjectURL(file);
        previewName.textContent = file.name;
        previewSize.textContent = (file.size / 1024).toFixed(1) + " KB";
        imagePreview.style.display = "block";
    });

    cancelImage.addEventListener("click", clearImagePreview);

    //send on enter
    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            form.requestSubmit();
        }
    });

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const message = input.value.trim();
        const file = imageInput.files[0];

        //block if both empty
        if (!message && !file) return;

        const formData = new FormData();
        if (message) formData.append("message", message);
        if (file) formData.append("image", file);

        const response = await fetch("/send-message", {
            method: "POST",
            body: formData
        });

        const result = await response.json();

        if (response.ok) {
            //clear the file input
            input.value = "";
            clearImagePreview();
            input.focus();
        } else {
            alert(result.error || "Failed to send message");
        }
    });
</script>
</body>
</html>
