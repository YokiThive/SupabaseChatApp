<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Login and Signup</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> <!--CSS-->
    </head>
    <body>
        <div class="container">
            <div class="form-sec"> <!--Login-->
                <div class="form-container active" id="LoginForm">
                    <h1>Wassup Hawking Crew</h1>
                    <p>Sign in to your account</p>
                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            <div class="flash-messages">
                                {% for message in messages %}
                                    <div class="flash-message">{{ message }}</div>
                                {% endfor %}
                            </div>
                        {% endif %}
                    {% endwith %}
                    <form id="loginFormSubmit" method="POST" action="/">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" class="form-control" placeholder="Email Address" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
                        </div>
                        <div class="forgot-pass">
                            <a href="#" onclick="showForgotPassword()">Forgot Password</a>
                        </div>
                        <button class="btn-submit" type="submit">Sign In</button>
                    </form>
                    <div class="google-login">
                        <button type="button" class="btn-submit" onclick="signInWithGoogle()">
                            Continue with Google
                        </button>
                    </div>
                    <p class="register">Don't have an account?
                        <a href="/register" class="register-link">Register</a>
                    </p>
                </div>
            </div>
        </div>
        <!--Use script for js file-->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = "{{ supabase_url }}";
        const supabaseAnonKey = "{{ supabase_anon_key }}";

        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        async function signInWithGoogle() {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: "google",
                options: {
                    redirectTo: "{{ redirect_url }}"
                }
            });

            if (error) {
                alert(error.message);
            }
        }
    </script>
    </body>
</html>
